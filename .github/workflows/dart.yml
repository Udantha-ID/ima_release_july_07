name: iOS IPA Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"

      - name: Flutter Version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get Packages
        run: flutter pub get

      - name: Install Pods
        working-directory: ios
        run: |
          rm -rf Pods
          rm -f Podfile.lock
          pod repo update
          pod install

      - name: Show Deployment Target
        run: |
          grep -R "IPHONEOS_DEPLOYMENT_TARGET" ios || true
          grep -R "MinimumOSVersion" ios || true

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create Payload
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          cp -R Runner.app Payload/

      - name: Create IPA
        working-directory: build/ios/iphoneos
        run: zip -r FlutterIpaExport.ipa Payload

      - name: Verify IPA
        run: ls -lh build/ios/iphoneos

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterIpaExport
          path: build/ios/iphoneos/FlutterIpaExport.ipa

      - name: Upload IPA to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          asset_name: FlutterIpaExport.ipa
          tag: v1.0
          release_name: v1.0
          overwrite: true
          body: Flutter iOS IPA
