name: iOS IPA Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Flutter Clean
        run: flutter clean

      - name: Get Packages
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: |
          rm -rf Pods
          rm -f Podfile.lock
          pod repo update
          pod install

      - name: Check iOS Deployment Target
        run: |
          grep -R "IPHONEOS_DEPLOYMENT_TARGET" ios || true
          grep -R "MinimumOSVersion" ios || true

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign

      - name: Create Payload Folder
        working-directory: build/ios/iphoneos
        run: |
          mkdir -p Payload
          cp -R Runner.app Payload/

      - name: Create IPA
        working-directory: build/ios/iphoneos
        run: |
          zip -r FlutterIpaExport.ipa Payload

      - name: Verify IPA Created
        run: |
          echo "IPA Location:"
          ls -lh build/ios/iphoneos
          echo ""
          echo "IPA File:"
          ls -lh build/ios/iphoneos/FlutterIpaExport.ipa

      # Download from Actions page
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterIpaExport
          path: build/ios/iphoneos/FlutterIpaExport.ipa
          retention-days: 30

      # Upload to GitHub Release
      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ipa-${{ github.run_number }}
          name: iOS IPA Build ${{ github.run_number }}
          body: |
            Flutter iOS IPA Build

            Generated automatically using GitHub Actions.
          files: |
            build/ios/iphoneos/FlutterIpaExport.ipa
